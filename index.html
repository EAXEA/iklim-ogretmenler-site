<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İklim Öğretmenler</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --green:#0f3c2f;
  --accent:#18b8a6;
}

body{
  margin:0;
  font-family:"Inter",sans-serif;
  background:#f7f8f6;
}

/* NAVBAR */
header{
  position:sticky;
  top:0;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:.3s;
  z-index:50;
}

header.scrolled{
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,.7);
  box-shadow:0 6px 20px rgba(0,0,0,.08);
}

nav a{
  margin:0 12px;
  text-decoration:none;
  color:#333;
  font-weight:500;
}

/* HERO */
.hero{
  background:var(--green);
  color:white;
  padding:90px 40px;
}

.hero h1{
  font-family:"Playfair Display";
  font-size:52px;
}

/* SECTION */
.section{
  padding:80px 40px;
}

h2{
  font-family:"Playfair Display";
  font-size:36px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:30px;
}

.card{
  background:white;
  padding:24px;
  border-radius:14px;
  position:relative;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}

/* DOWNLOAD FADE */
.card-download{
  position:absolute;
  bottom:20px;
  right:20px;
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
  font-weight:600;
  color:var(--accent);
}

.card:hover .card-download{
  opacity:1;
  transform:translateY(0);
}

/* GALLERY */
.gallery{
  background:#0c2c22;
  color:white;
}

.slider{
  display:flex;
  gap:16px;
  overflow-x:auto;
}

.slider img{
  width:280px;
  border-radius:10px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal iframe{
  width:80%;
  height:80%;
  border:none;
  border-radius:10px;
}

.modal.show{
  display:flex;
}

/* MOBILE */
@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header id="navbar">
  <strong>İklim Öğretmenler</strong>
  <nav>
    <a href="#">Hakkında</a>
    <a href="#">Amaç</a>
    <a href="#">Çıktılar</a>
  </nav>
</header>

<section class="hero">
  <h1>İklim için Değişen ve Dönüştüren Öğretmenler</h1>
</section>

<section class="section">
  <h2>Proje Çıktıları</h2>

  <div class="grid">

    <div class="card">
      <h3>📘 Öğretmen El Kitabı</h3>
      <p>Kapsamlı rehber</p>

      <a href="./files/ogretmenelkitabi.pdf" download class="card-download">
        İndir ↓
      </a>

      <button onclick="openPDF()" style="margin-top:10px;">Önizle</button>
    </div>

  </div>
</section>

<section class="section gallery">
  <h2>Galeri</h2>

  <div class="slider">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
    <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952">
  </div>
</section>

<div class="modal" id="modal">
  <iframe src="./files/ogretmenelkitabi.pdf"></iframe>
</div>

<script>
/* NAVBAR SCROLL */
window.addEventListener("scroll",()=>{
  document.getElementById("navbar")
    .classList.toggle("scrolled",window.scrollY>20)
})

/* PDF MODAL */
function openPDF(){
  document.getElementById("modal").classList.add("show")
}

document.getElementById("modal").onclick=()=>{
  document.getElementById("modal").classList.remove("show")
}
</script>

</body>
</html>
