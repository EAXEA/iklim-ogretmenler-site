<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İklim İçin Değişen Öğretmenler</title>

<!-- SEO -->
<meta name="description" content="İklim değişikliği eğitimi üzerine öğretmen gelişim programı. ODTÜ destekli akademik proje.">

<!-- Open Graph -->
<meta property="og:title" content="İklim İçin Değişen Öğretmenler">
<meta property="og:description" content="Öğretmenler için iklim eğitimi programı">
<meta property="og:type" content="website">
<meta property="og:image" content="/preview.jpg">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

/* ================= SYSTEM ================= */
:root{
  --space: 24px;
  --radius: 16px;
  --bg:#f6f7f5;
  --text:#1c2b26;
  --muted:#6b7c76;
  --primary:#0f3c2f;
  --accent:#19b7a6;
}

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

.container{
  width:min(1100px, calc(100% - 40px));
  margin:auto;
}

/* ================= NAV ================= */
.header{
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,.85);
  border-bottom:1px solid rgba(0,0,0,.05);
  transition:.3s;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

/* ================= HERO ================= */
.hero{
  padding:100px 0;
  background:linear-gradient(180deg,#123d2f,#0c2a22);
  color:white;
}

.hero h1{
  font-family:Playfair Display;
  font-size:3rem;
}

/* ================= BUTTON ================= */
.btn{
  padding:12px 20px;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-weight:600;
  transition:.2s;
}
.btn:hover{
  transform:translateY(-2px);
}

/* ================= SWIPER ================= */
.swiper{
  margin-top:40px;
}

.swiper-slide{
  border-radius:16px;
  overflow:hidden;
}

.swiper-slide img{
  width:100%;
  height:300px;
  object-fit:cover;
}

/* ================= FORM ================= */
input,textarea{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* ================= FOOTER ================= */
.footer{
  background:#0c251d;
  color:white;
  padding:40px;
  text-align:center;
}

</style>
</head>

<body>

<header class="header">
  <div class="container nav">
    <strong>İklim Öğretmenleri</strong>
    <nav>
      <a href="#about">Hakkında</a>
      <a href="#gallery">Galeri</a>
      <a href="#contact">İletişim</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>İklim için dönüşen öğretmenler</h1>
    <p>Akademik gelişim programı</p>
    <br>
    <a class="btn">Projeyi İncele</a>
  </div>
</section>

<!-- ================= GALLERY ================= -->
<section id="gallery" class="container" style="padding:80px 0;">
  <h2>Galeri</h2>

  <div class="swiper">
    <div class="swiper-wrapper">

      <div class="swiper-slide">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      </div>

      <div class="swiper-slide">
        <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952">
      </div>

      <div class="swiper-slide">
        <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854">
      </div>

    </div>
  </div>
</section>

<!-- ================= CONTACT ================= -->
<section id="contact" class="container" style="padding:80px 0;">
  <h2>İletişim</h2>

  <form action="https://formspree.io/f/yourID" method="POST">
    <input name="name" placeholder="Ad Soyad" required><br><br>
    <input name="email" type="email" placeholder="E-posta" required><br><br>
    <textarea name="message" placeholder="Mesaj"></textarea><br><br>
    <button class="btn">Gönder</button>
  </form>
</section>

<footer class="footer">
  © 2026 ODTÜ
</footer>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
new Swiper('.swiper', {
  loop:true,
  spaceBetween:20,
  slidesPerView:1.2,
  centeredSlides:true,
  autoplay:{
    delay:3000
  },
  breakpoints:{
    768:{slidesPerView:2.2},
    1024:{slidesPerView:3}
  }
});
</script>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXX');
</script>

</body>
</html>
