<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>İklim için Değişen ve Dönüştüren Öğretmenler</title>

<meta name="description" content="İklim değişikliği eğitimi üzerine öğretmen gelişim programı.">

<meta property="og:title" content="İklim için Değişen Öğretmenler">
<meta property="og:description" content="ODTÜ destekli akademik proje">
<meta property="og:image" content="/preview.jpg">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

/* ===== DESIGN SYSTEM ===== */
:root{
  --space-xs:8px;
  --space-sm:16px;
  --space-md:24px;
  --space-lg:40px;
  --space-xl:80px;

  --radius:16px;
  --radius-lg:24px;

  --bg:#f6f7f4;
  --white:#fff;
  --text:#13241d;
  --muted:#5d716a;

  --primary:#0f3c2f;
  --accent:#18b8a6;

  --shadow-sm:0 6px 20px rgba(0,0,0,.06);
  --shadow-md:0 14px 40px rgba(0,0,0,.10);
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}

.container{
  width:min(1180px, calc(100% - 40px));
  margin:auto;
}

/* ===== NAVBAR ===== */
.topbar{
  position:sticky;
  top:0;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,.7);
  transition:.3s;
  z-index:100;
}

.topbar.scrolled{
  background:rgba(255,255,255,.9);
  box-shadow:var(--shadow-sm);
}

.nav-wrap{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.nav a{
  margin-left:24px;
  position:relative;
  font-weight:500;
}

.nav a::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:0;
  height:2px;
  background:var(--accent);
  transition:.3s;
}
.nav a:hover::after{width:100%}

/* ===== HERO ===== */
.hero{
  padding:var(--space-xl) 0;
  background:linear-gradient(180deg,#124234,#0e3025);
  color:white;
}

.hero h1{
  font-family:Playfair Display;
  font-size:clamp(2.8rem,5vw,4.5rem);
  line-height:1.05;
}

.hero p{
  color:rgba(255,255,255,.85);
  max-width:600px;
}

.btn{
  display:inline-block;
  margin-top:var(--space-md);
  padding:14px 20px;
  border-radius:12px;
  background:var(--accent);
  color:white;
  font-weight:600;
  transition:.25s;
}
.btn:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow-md);
}

/* ===== SECTION ===== */
.section{
  padding:var(--space-xl) 0;
}

/* ===== CARDS ===== */
.card{
  background:white;
  border-radius:var(--radius);
  padding:var(--space-md);
  box-shadow:var(--shadow-sm);
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-md);
}

/* ===== GALLERY ===== */
.swiper{
  margin-top:var(--space-lg);
}

.swiper-slide{
  border-radius:var(--radius-lg);
  overflow:hidden;
  transition:.3s;
}
.swiper-slide:hover{
  transform:scale(1.02);
}

.swiper-slide img{
  width:100%;
  height:280px;
  object-fit:cover;
}

/* ===== FORM ===== */
input,textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:14px;
  transition:.2s;
}

input:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(24,184,166,.1);
  outline:none;
}

.send{
  background:var(--primary);
  color:white;
  padding:14px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}
.send:hover{
  transform:translateY(-2px);
}

/* ===== FOOTER ===== */
.footer{
  background:#0c251d;
  color:white;
  text-align:center;
  padding:40px;
}

/* ===== ANIMATION ===== */
.reveal{
  opacity:0;
  transform:translateY(20px);
  transition:.6s;
}
.reveal.visible{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<header class="topbar" id="navbar">
  <div class="container nav-wrap">
    <strong>İklim Öğretmenleri</strong>
    <nav class="nav">
      <a href="#about">Hakkında</a>
      <a href="#gallery">Galeri</a>
      <a href="#contact">İletişim</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container reveal">
    <h1>İklim için dönüşen öğretmenler</h1>
    <p>Akademik gelişim programı</p>
    <a class="btn">Projeyi İncele</a>
  </div>
</section>

<section id="gallery" class="section container reveal">
  <h2>Galeri</h2>

  <div class="swiper">
    <div class="swiper-wrapper">

      <div class="swiper-slide">
        <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
      </div>

      <div class="swiper-slide">
        <img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952">
      </div>

      <div class="swiper-slide">
        <img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854">
      </div>

    </div>
  </div>
</section>

<section id="contact" class="section container reveal">
  <h2>İletişim</h2>

  <form action="https://formspree.io/f/YOUR_ID" method="POST">
    <input type="text" name="name" placeholder="Ad Soyad" required>
    <input type="email" name="email" placeholder="E-posta" required>
    <textarea name="message" placeholder="Mesaj"></textarea>
    <button class="send" type="submit">Gönder</button>
  </form>
</section>

<footer class="footer">
  © 2026 ODTÜ
</footer>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
new Swiper('.swiper', {
  loop:true,
  spaceBetween:20,
  slidesPerView:1.2,
  centeredSlides:true,
  autoplay:{ delay:3000 },
  breakpoints:{
    768:{slidesPerView:2},
    1024:{slidesPerView:3}
  }
});

/* NAV SCROLL */
window.addEventListener("scroll",()=>{
  document.getElementById("navbar")
    .classList.toggle("scrolled", window.scrollY>30);
});

/* REVEAL */
const obs=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("visible");
  });
},{threshold:.2});

document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
</script>

<!-- Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXX');
</script>

</body>
</html>
